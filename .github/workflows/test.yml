name: Test

# Builds, vets, and runs the known-answer tests on every push and PR against
# main. The digest correctness is the whole point of the package, so this gates
# every change.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...
